<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#FFDF73" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>
  </defs>
  <!-- Squircle Background (Deep premium midnight blue/black) -->
  <rect width="180" height="180" rx="44" fill="#0B0F19" />
  
  <!-- Crown & Temple/Building Emblem -->
  <g transform="translate(45, 42)">
    <!-- 3 Crown Peaks -->
    <path d="M10 20 L30 38 L45 10 L60 38 L80 20 L72 45 L18 45 Z" fill="url(#gold-grad)" />
    
    <!-- Architrave / Beam -->
    <rect x="12" y="50" width="66" height="6" rx="1" fill="url(#gold-grad)" />
    
    <!-- 3 Pillars (Building aspect) -->
    <rect x="18" y="60" width="10" height="28" rx="1" fill="url(#gold-grad)" />
    <rect x="40" y="60" width="10" height="28" rx="1" fill="url(#gold-grad)" />
    <rect x="62" y="60" width="10" height="28" rx="1" fill="url(#gold-grad)" />
    
    <!-- Base / Foundation -->
    <rect x="6" y="92" width="78" height="8" rx="2" fill="url(#gold-grad)" />
  </g>
</svg>